<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        background: url('background.jpg') no-repeat center center/cover;
        display:flex;
        align-items:center;
        justify-content:flex-start;
        font-family: Arial, sans-serif;
        color:white;
        padding-left:80px;
    }

    .content{
        max-width:600px;
    }

    .content h1{
        font-size:4rem;
        color:#7ed957;
        margin-bottom:10px;
    }

    .content h2{
        font-size:4.5rem;
        font-weight:bold;
        margin-bottom:10px;
    }

    .content p{
        font-size:1.8rem;
        color:#e0e0e0;
    }

    /* Optional dark overlay for readability */
    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.25);
        z-index:-1;
    }
</style>
</head>
<body>

</div>

</body>
</html>
